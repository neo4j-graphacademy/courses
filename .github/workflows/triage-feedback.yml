name: Feedback triage

on:
  schedule:
    # First and third Monday of each month (~every two weeks). GHA cron cannot express a true 14-day interval.
    - cron: "0 8 1-7 * 1"
    - cron: "0 8 15-21 * 1"
  workflow_dispatch:

jobs:
  run_triage:
    runs-on: ubuntu-latest
    environment: production
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Use Node.js 18
        uses: actions/setup-node@v4
        with:
          node-version: "18"

      - name: Install NPM Dependencies
        run: npm install --include=dev

      - name: Run triage
        env:
          LINEAR_API_KEY: ${{ secrets.LINEAR_API_KEY }}
          NEO4J_HOST: ${{ vars.NEO4J_HOST }}
          NEO4J_USERNAME: ${{ vars.NEO4J_USERNAME }}
          NEO4J_PASSWORD: ${{ secrets.NEO4J_PASSWORD }}
        run: npm run feedback:triage
