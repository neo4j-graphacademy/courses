name: PR Tests

on:
  pull_request:
    types: [labeled]
  issue_comment:
    types: [created]

jobs:
  html_check:
    name: Build and test HTML
    if: |
      (github.event_name == 'pull_request' && github.event.label.name == 'Ready') ||
      (github.event_name == 'issue_comment' && github.event.issue.pull_request != null && startsWith(github.event.comment.body, '/test-html'))
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write

    steps:
      - name: Resolve PR metadata
        id: pr
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          if [ "${{ github.event_name }}" == "pull_request" ]; then
            echo "number=${{ github.event.pull_request.number }}" >> $GITHUB_OUTPUT
            echo "sha=${{ github.event.pull_request.head.sha }}" >> $GITHUB_OUTPUT
          else
            PR_NUMBER=${{ github.event.issue.number }}
            SHA=$(gh api repos/${{ github.repository }}/pulls/${PR_NUMBER} --jq '.head.sha')
            echo "number=${PR_NUMBER}" >> $GITHUB_OUTPUT
            echo "sha=${SHA}" >> $GITHUB_OUTPUT
          fi

      - uses: actions/checkout@v4
        with:
          ref: ${{ steps.pr.outputs.sha }}

      - uses: actions/setup-node@v4
        with:
          node-version: "16"

      - name: Install dependencies
        run: npm install --include=dev

      - name: Build HTML
        id: build
        run: npm run html:build 2>&1 | tee build-output.txt
        continue-on-error: true

      - name: Test HTML
        id: test
        if: steps.build.outcome == 'success'
        run: npm run html:test 2>&1 | tee test-output.txt
        continue-on-error: true

      - name: Format PR comment
        id: comment
        run: |
          BUILD_OUTCOME=${{ steps.build.outcome }} \
          TEST_OUTCOME=${{ steps.test.outcome }} \
          npx ts-node src/commands/format-pr-comment.ts

      - name: Post results to PR
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const body = fs.readFileSync('pr-comment.md', 'utf8');
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: ${{ steps.pr.outputs.number }},
              body,
            });
