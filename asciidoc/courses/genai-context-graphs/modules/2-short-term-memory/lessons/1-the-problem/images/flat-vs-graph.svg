<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 500">
  <defs>
    <style>
      .title { font-family: Arial, sans-serif; font-size: 16px; font-weight: bold; fill: #014063; }
      .subtitle { font-family: Arial, sans-serif; font-size: 14px; font-weight: bold; fill: #485662; }
      .label { font-family: Arial, sans-serif; font-size: 11px; fill: #485662; }
      .small-label { font-family: Arial, sans-serif; font-size: 10px; fill: #485662; }
      .log-line { fill: #F5F7FA; stroke: #485662; stroke-width: 1; }
      .node { stroke-width: 2; }
      .message-node { fill: #57C7E3; stroke: #014063; }
      .entity-node { fill: #F79767; stroke: #014063; }
      .trace-node { fill: #D9C8AE; stroke: #014063; }
      .relationship { fill: none; stroke: #A5ABB6; stroke-width: 2; marker-end: url(#arrow); }
      .error-icon { fill: #CC0000; font-family: Arial, sans-serif; font-size: 18px; font-weight: bold; }
      .success-icon { fill: #00CC52; font-family: Arial, sans-serif; font-size: 18px; font-weight: bold; }
    </style>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto">
      <polygon points="0 0, 10 3, 0 6" fill="#A5ABB6" />
    </marker>
  </defs>
  
  <!-- Title -->
  <text x="350" y="25" class="title">Flat Text vs. Graph Structure</text>
  
  <!-- LEFT SIDE: Flat Text History -->
  <text x="20" y="55" class="subtitle">Flat Text History</text>
  <text x="20" y="75" class="error-icon">L</text>
  <text x="45" y="75" class="label">Cannot query or traverse</text>
  
  <!-- Log representation -->
  <rect x="20" y="90" width="360" height="30" class="log-line"/>
  <text x="30" y="110" class="small-label" style="font-family: monospace;">Msg 1: Review Jessica Norris's account...</text>
  
  <rect x="20" y="125" width="360" height="30" class="log-line"/>
  <text x="30" y="145" class="small-label" style="font-family: monospace;">Msg 2: Agent retrieved account details</text>
  
  <rect x="20" y="160" width="360" height="30" class="log-line"/>
  <text x="30" y="180" class="small-label" style="font-family: monospace;">Msg 3: What was the last transaction...</text>
  
  <rect x="20" y="195" width="360" height="30" class="log-line"/>
  <text x="30" y="215" class="small-label" style="font-family: monospace;">Msg 4: Agent requested clarification...</text>
  
  <!-- Questions that fail -->
  <rect x="20" y="245" width="360" height="220" style="fill: #FFE5E5; stroke: #CC0000; stroke-width: 2; stroke-dasharray: 4,4;" rx="5"/>
  <text x="30" y="270" class="subtitle" style="fill: #CC0000;">Cannot answer:</text>
  
  <text x="30" y="295" class="label">L "Which messages mentioned Jessica Norris?"</text>
  <text x="40" y="315" class="small-label">’ Must scan entire log line-by-line</text>
  
  <text x="30" y="340" class="label">L "Find the message that triggered reasoning X"</text>
  <text x="40" y="360" class="small-label">’ No link between message and trace</text>
  
  <text x="30" y="385" class="label">L "What entities were known at decision Y?"</text>
  <text x="40" y="405" class="small-label">’ No structured entity tracking</text>
  
  <text x="30" y="430" class="label">L "Show conversation path to this conclusion"</text>
  <text x="40" y="450" class="small-label">’ No traversable relationships</text>
  
  <!-- RIGHT SIDE: Graph Structure -->
  <text x="520" y="55" class="subtitle">Graph Structure</text>
  <text x="520" y="75" class="success-icon"></text>
  <text x="545" y="75" class="label">Queryable and traversable</text>
  
  <!-- Graph visualization -->
  <!-- Messages -->
  <circle cx="600" cy="120" r="35" class="node message-node"/>
  <text x="577" y="123" class="small-label">Message 1</text>
  <text x="570" y="135" class="small-label" style="font-size: 9px;">Review account</text>
  
  <circle cx="720" cy="120" r="35" class="node message-node"/>
  <text x="697" y="123" class="small-label">Message 3</text>
  <text x="690" y="135" class="small-label" style="font-size: 9px;">Last transaction?</text>
  
  <!-- Entity -->
  <ellipse cx="660" cy="220" rx="45" ry="30" class="node entity-node"/>
  <text x="632" y="225" class="small-label">Jessica Norris</text>
  
  <!-- Reasoning Trace -->
  <rect x="750" y="200" width="70" height="40" class="node trace-node" rx="5"/>
  <text x="760" y="215" class="small-label">Reasoning</text>
  <text x="768" y="230" class="small-label">Trace</text>
  
  <!-- Relationships -->
  <path d="M 630 130 L 650 190" class="relationship"/>
  <text x="635" y="165" class="small-label">MENTIONS</text>
  
  <path d="M 695 135 L 680 190" class="relationship"/>
  <text x="682" y="165" class="small-label">MENTIONS</text>
  
  <path d="M 750 130 L 770 200" class="relationship"/>
  <text x="755" y="165" class="small-label">TRIGGERED</text>
  
  <path d="M 705 220 L 750 220" class="relationship"/>
  <text x="710" y="215" class="small-label">ABOUT</text>
  
  <!-- Questions that succeed -->
  <rect x="520" y="270" width="360" height="195" style="fill: #E7FAFB; stroke: #006E58; stroke-width: 2;" rx="5"/>
  <text x="530" y="295" class="subtitle" style="fill: #006E58;">Can answer by traversal:</text>
  
  <text x="530" y="320" class="label"> "Which messages mentioned Jessica Norris?"</text>
  <text x="540" y="340" class="small-label">’ MATCH (m:Message)-[:MENTIONS]->(e {name: "Jessica Norris"})</text>
  
  <text x="530" y="365" class="label"> "Find message that triggered reasoning X"</text>
  <text x="540" y="385" class="small-label">’ MATCH (m:Message)-[:TRIGGERED]->(t:Trace {id: X})</text>
  
  <text x="530" y="410" class="label"> "What entities were in this conversation?"</text>
  <text x="540" y="430" class="small-label">’ MATCH (m:Message)-[:MENTIONS]->(e:Entity)</text>
  
  <text x="530" y="455" class="small-label" style="font-weight: bold; fill: #006E58;">Graph relationships enable queries that flat text cannot support</text>
</svg>
