<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 600">
  <defs>
    <style>
      .title { font-family: Arial, sans-serif; font-size: 16px; font-weight: bold; fill: #014063; }
      .subtitle { font-family: Arial, sans-serif; font-size: 14px; font-weight: bold; fill: #485662; }
      .label { font-family: Arial, sans-serif; font-size: 11px; fill: #485662; }
      .small-label { font-family: Arial, sans-serif; font-size: 10px; fill: #485662; }
      .question { fill: #E7FAFB; stroke: #006E58; stroke-width: 2; }
      .ai-agent { fill: #014063; stroke: #014063; stroke-width: 2; }
      .ai-text { fill: #FFFFFF; font-family: Arial, sans-serif; font-size: 12px; font-weight: bold; }
      .log-container { fill: #F5F7FA; stroke: #485662; stroke-width: 2; }
      .log-line { font-family: monospace; font-size: 9px; fill: #485662; }
      .irrelevant { fill: #FFE5E5; }
      .relevant { fill: #E7FAFB; }
      .graph-container { fill: #F5F7FA; stroke: #006E58; stroke-width: 2; }
      .node { stroke-width: 2; }
      .message-node { fill: #57C7E3; stroke: #014063; }
      .entity-node { fill: #F79767; stroke: #014063; }
      .relationship { fill: none; stroke: #A5ABB6; stroke-width: 2; marker-end: url(#arrow); }
      .result-good { fill: #E7FAFB; stroke: #00CC52; stroke-width: 2; }
      .result-bad { fill: #FFE5E5; stroke: #CC0000; stroke-width: 2; }
      .arrow-line { fill: none; stroke: #485662; stroke-width: 2; marker-end: url(#arrowhead); }
    </style>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto">
      <polygon points="0 0, 10 3, 0 6" fill="#A5ABB6" />
    </marker>
    <marker id="arrowhead" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto">
      <polygon points="0 0, 10 3, 0 6" fill="#485662" />
    </marker>
  </defs>
  
  <!-- Title -->
  <text x="350" y="30" class="title">Query Processing: Flat Log vs. Knowledge Graph</text>
  
  <!-- Question -->
  <rect x="350" y="50" width="300" height="50" class="question" rx="5"/>
  <text x="360" y="73" class="label">Query: "Which messages mentioned</text>
  <text x="360" y="88" class="label">Jessica Norris?"</text>
  
  <!-- AI Agent -->
  <rect x="420" y="120" width="160" height="40" class="ai-agent" rx="5"/>
  <text x="465" y="145" class="ai-text">AI Agent</text>
  
  <!-- Arrows to both approaches -->
  <path d="M 450 160 L 250 220" class="arrow-line"/>
  <path d="M 550 160 L 750 220" class="arrow-line"/>
  
  <!-- LEFT SIDE: Flat Log Approach -->
  <text x="50" y="200" class="subtitle">? Flat Text Log</text>
  
  <!-- Log container -->
  <rect x="50" y="220" width="400" height="240" class="log-container" rx="5"/>
  <text x="60" y="240" class="small-label" style="font-weight: bold;">Scans entire log sequentially:</text>
  
  <!-- Log entries - mix of relevant and irrelevant -->
  <rect x="60" y="250" width="380" height="18" class="irrelevant"/>
  <text x="65" y="262" class="log-line">[10:23] System: Connection established</text>
  
  <rect x="60" y="270" width="380" height="18" class="relevant"/>
  <text x="65" y="282" class="log-line">[10:24] User: Review Jessica Norris account</text>
  
  <rect x="60" y="290" width="380" height="18" class="irrelevant"/>
  <text x="65" y="302" class="log-line">[10:24] Agent: Processing request...</text>
  
  <rect x="60" y="310" width="380" height="18" class="irrelevant"/>
  <text x="65" y="322" class="log-line">[10:25] System: Database query executed</text>
  
  <rect x="60" y="330" width="380" height="18" class="irrelevant"/>
  <text x="65" y="342" class="log-line">[10:25] Agent: Retrieved account details</text>
  
  <rect x="60" y="350" width="380" height="18" class="irrelevant"/>
  <text x="65" y="362" class="log-line">[10:26] User: What was last transaction?</text>
  
  <rect x="60" y="370" width="380" height="18" class="irrelevant"/>
  <text x="65" y="382" class="log-line">[10:27] Agent: Requesting clarification</text>
  
  <rect x="60" y="390" width="380" height="18" class="relevant"/>
  <text x="65" y="402" class="log-line">[10:28] User: For Jessica Norris account</text>
  
  <rect x="60" y="410" width="380" height="18" class="irrelevant"/>
  <text x="65" y="422" class="log-line">[10:29] System: Processing query...</text>
  
  <rect x="60" y="430" width="380" height="18" class="irrelevant"/>
  <text x="65" y="442" class="log-line">[10:30] Agent: Transaction history retrieved</text>
  
  <!-- Result -->
  <rect x="50" y="480" width="400" height="80" class="result-bad" rx="5"/>
  <text x="60" y="500" class="subtitle" style="fill: #CC0000;">Problem:</text>
  <text x="60" y="520" class="label">• Returns all log entries (90% irrelevant)</text>
  <text x="60" y="537" class="label">• No structured entity tracking</text>
  <text x="60" y="554" class="label">• Requires scanning entire conversation</text>
  
  <!-- RIGHT SIDE: Graph Approach -->
  <text x="550" y="200" class="subtitle">? Knowledge Graph</text>
  
  <!-- Graph container -->
  <rect x="550" y="220" width="400" height="240" class="graph-container" rx="5"/>
  <text x="560" y="240" class="small-label" style="font-weight: bold;">Traverses relationships directly:</text>
  
  <!-- Graph visualization -->
  <!-- Message nodes -->
  <circle cx="650" cy="290" r="30" class="node message-node"/>
  <text x="630" y="293" class="small-label">Message 1</text>
  <text x="628" y="305" class="small-label" style="font-size: 9px;">Review acct</text>
  
  <circle cx="820" cy="290" r="30" class="node message-node"/>
  <text x="800" y="293" class="small-label">Message 2</text>
  <text x="797" y="305" class="small-label" style="font-size: 9px;">Last trans?</text>
  
  <circle cx="650" cy="390" r="30" class="node message-node"/>
  <text x="630" y="393" class="small-label">Message 3</text>
  <text x="622" y="405" class="small-label" style="font-size: 9px;">For J. Norris</text>
  
  <!-- Entity node - highlighted -->
  <ellipse cx="735" cy="340" rx="50" ry="32" class="node entity-node" style="stroke: #00CC52; stroke-width: 3;"/>
  <text x="695" y="343" class="label" style="font-weight: bold;">Jessica Norris</text>
  
  <!-- Relationships -->
  <path d="M 678 295 L 695 325" class="relationship"/>
  <text x="682" y="310" class="small-label">MENTIONS</text>
  
  <path d="M 792 295 L 775 325" class="relationship"/>
  <text x="765" y="310" class="small-label">MENTIONS</text>
  
  <path d="M 678 385 L 695 360" class="relationship"/>
  <text x="682" y="375" class="small-label">MENTIONS</text>
  
  <!-- Query visualization -->
  <text x="560" y="435" class="small-label" style="font-family: monospace; fill: #006E58;">MATCH (m:Message)-[:MENTIONS]-></text>
  <text x="560" y="448" class="small-label" style="font-family: monospace; fill: #006E58;">  (e:Entity {name: "Jessica Norris"})</text>
  
  <!-- Result -->
  <rect x="550" y="480" width="400" height="80" class="result-good" rx="5"/>
  <text x="560" y="500" class="subtitle" style="fill: #00CC52;">Solution:</text>
  <text x="560" y="520" class="label">• Returns only 3 relevant messages</text>
  <text x="560" y="537" class="label">• Direct relationship traversal</text>
  <text x="560" y="554" class="label">• No scanning required - follows connections</text>
</svg>
