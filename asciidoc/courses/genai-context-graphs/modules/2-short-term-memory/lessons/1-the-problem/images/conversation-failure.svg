<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400">
  <defs>
    <style>
      .title { font-family: Arial, sans-serif; font-size: 14px; font-weight: bold; fill: #014063; }
      .label { font-family: Arial, sans-serif; font-size: 12px; fill: #485662; }
      .message-box { fill: #F5F7FA; stroke: #014063; stroke-width: 2; }
      .llm-box { fill: #014063; stroke: #014063; stroke-width: 2; }
      .llm-text { fill: #FFFFFF; font-family: Arial, sans-serif; font-size: 11px; }
      .error-box { fill: #FFE5E5; stroke: #CC0000; stroke-width: 2; stroke-dasharray: 4,4; }
      .arrow { fill: none; stroke: #485662; stroke-width: 2; marker-end: url(#arrowhead); }
      .error-arrow { fill: none; stroke: #CC0000; stroke-width: 2; marker-end: url(#error-arrowhead); }
      .step-num { font-family: Arial, sans-serif; font-size: 14px; font-weight: bold; fill: #00CC52; }
    </style>
    <marker id="arrowhead" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto">
      <polygon points="0 0, 10 3, 0 6" fill="#485662" />
    </marker>
    <marker id="error-arrowhead" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto">
      <polygon points="0 0, 10 3, 0 6" fill="#CC0000" />
    </marker>
  </defs>
  
  <!-- Step 1 -->
  <text x="20" y="30" class="step-num">Step 1</text>
  <rect x="60" y="15" width="300" height="40" class="message-box" rx="5"/>
  <text x="70" y="40" class="label">Review Jessica Norris's account for credit increase</text>
  
  <path d="M 210 55 L 210 90" class="arrow"/>
  
  <rect x="150" y="90" width="120" height="35" class="llm-box" rx="5"/>
  <text x="165" y="110" class="llm-text">LLM processes</text>
  <text x="165" y="122" class="llm-text">and retrieves data</text>
  
  <!-- Step 2 -->
  <text x="420" y="30" class="step-num">Step 2</text>
  <rect x="460" y="15" width="300" height="40" class="message-box" rx="5"/>
  <text x="470" y="40" class="label">Agent returns account details</text>
  
  <!-- Step 3 -->
  <text x="20" y="180" class="step-num">Step 3</text>
  <rect x="60" y="165" width="300" height="40" class="message-box" rx="5"/>
  <text x="70" y="190" class="label">What was the last transaction on that account?</text>
  
  <path d="M 210 205 L 210 240" class="error-arrow"/>
  
  <!-- Error state -->
  <rect x="120" y="240" width="180" height="80" class="error-box" rx="5"/>
  <text x="130" y="260" class="label" style="fill: #CC0000; font-weight: bold;">L Context Lost</text>
  <text x="130" y="280" class="label" style="font-size: 10px;">LLM has no memory of</text>
  <text x="130" y="295" class="label" style="font-size: 10px;">Step 1</text>
  <text x="130" y="310" class="label" style="font-size: 10px;">"that account" = unknown</text>
  
  <!-- Explanation panel -->
  <rect x="420" y="165" width="360" height="155" style="fill: #E7FAFB; stroke: #006E58; stroke-width: 2;" rx="5"/>
  <text x="435" y="190" class="title">Why it fails:</text>
  <text x="435" y="210" class="label">" Each LLM call starts with no prior context</text>
  <text x="435" y="230" class="label">" Reference "that account" points to Step 1</text>
  <text x="435" y="250" class="label">" Without memory, the agent cannot resolve</text>
  <text x="445" y="265" class="label">the reference to Jessica Norris</text>
  <text x="435" y="285" class="label">" Agent must ask user to repeat themselves</text>
  <text x="435" y="305" class="label">" Conversation flow breaks</text>
</svg>
