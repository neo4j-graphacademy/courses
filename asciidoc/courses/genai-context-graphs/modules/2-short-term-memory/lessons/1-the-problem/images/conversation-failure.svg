<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 550">
  <defs>
    <style>
      .chat-container { fill: #FFFFFF; stroke: #485662; stroke-width: 2; }
      .chat-header { fill: #014063; }
      .header-text { font-family: Arial, sans-serif; font-size: 16px; font-weight: bold; fill: #FFFFFF; }
      .human-bubble { fill: #E7FAFB; stroke: #006E58; stroke-width: 2; }
      .ai-bubble { fill: #F5F7FA; stroke: #014063; stroke-width: 2; }
      .error-bubble { fill: #FFE5E5; stroke: #CC0000; stroke-width: 2; }
      .message-text { font-family: Arial, sans-serif; font-size: 12px; fill: #485662; }
      .label-text { font-family: Arial, sans-serif; font-size: 10px; fill: #485662; font-style: italic; }
      .error-icon { font-size: 14px; }
    </style>
  </defs>
  
  <!-- Chat window container -->
  <rect x="50" y="20" width="500" height="500" class="chat-container" rx="10"/>
  
  <!-- Chat header -->
  <rect x="50" y="20" width="500" height="50" class="chat-header" rx="10"/>
  <rect x="50" y="45" width="500" height="25" class="chat-header"/>
  <text x="230" y="50" class="header-text">Customer Service Agent</text>
  
  <!-- Message 1: Human -->
  <text x="60" y="100" class="label-text">Human</text>
  <rect x="60" y="105" width="420" height="60" class="human-bubble" rx="10"/>
  <text x="75" y="125" class="message-text">Review Jessica Norris's account for a</text>
  <text x="75" y="142" class="message-text">credit limit increase.</text>
  
  <!-- Message 2: AI -->
  <text x="60" y="190" class="label-text">AI Agent</text>
  <rect x="60" y="195" width="480" height="75" class="ai-bubble" rx="10"/>
  <text x="75" y="215" class="message-text">I've retrieved Jessica Norris's account details:</text>
  <text x="75" y="232" class="message-text">• Current credit limit: $5,000</text>
  <text x="75" y="249" class="message-text">• Account status: Active</text>
  <text x="75" y="266" class="message-text">• Last payment: On time</text>
  
  <!-- Message 3: Human -->
  <text x="60" y="295" class="label-text">Human</text>
  <rect x="60" y="300" width="420" height="45" class="human-bubble" rx="10"/>
  <text x="75" y="320" class="message-text">What was the last transaction on that</text>
  <text x="75" y="337" class="message-text">account?</text>
  
  <!-- Message 4: AI Error -->
  <text x="60" y="370" class="label-text">AI Agent</text>
  <rect x="60" y="375" width="480" height="105" class="error-bubble" rx="10"/>
  <text x="75" y="395" class="message-text">❌ I apologize, but I don't have information</text>
  <text x="75" y="412" class="message-text">about which account you're referring to.</text>
  <text x="75" y="432" class="message-text">Could you please specify the account holder's</text>
  <text x="75" y="449" class="message-text">name again?</text>
  
  <!-- Annotation -->
  <rect x="60" y="495" width="480" height="20" style="fill: #FFE5E5; stroke: none;"/>
  <text x="70" y="508" style="font-family: Arial, sans-serif; font-size: 11px; fill: #CC0000; font-weight: bold;">Without memory, the AI cannot resolve "that account" from the earlier message</text>
</svg>
